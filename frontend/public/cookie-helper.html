<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频下载 - Cookies 配置助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .platform-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .platform-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .platform-card.active {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .platform-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .platform-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .douyin .platform-icon {
            background: linear-gradient(135deg, #00ffff 0%, #00ccff 100%);
        }

        .xiaohongshu .platform-icon {
            background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
        }

        .platform-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .status {
            margin-left: auto;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status.not-configured {
            background: #ffebee;
            color: #c62828;
        }

        .status.configured {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .step {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .step-number {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            margin-right: 10px;
        }

        .step-text {
            color: #555;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-right: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .alert-info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }

        .code-block {
            background: #263238;
            color: #aed581;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 10px;
            display: none;
        }

        .note {
            background: #fff8e1;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #f57c00;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍪 Cookies 配置助手</h1>
        <p class="subtitle">一键配置抖音、小红书登录状态</p>

        <div id="alert" class="alert"></div>

        <!-- 抖音配置 -->
        <div class="platform-card douyin" id="douyin-card">
            <div class="platform-header">
                <div class="platform-icon">抖</div>
                <span class="platform-name">抖音</span>
                <span class="status not-configured" id="douyin-status">未配置</span>
            </div>

            <div id="douyin-steps">
                <div class="step">
                    <span class="step-number">1</span>
                    <span class="step-text">点击下方按钮打开抖音网页版</span>
                </div>
                <div class="step">
                    <span class="step-number">2</span>
                    <span class="step-text">在抖音网页上登录你的账号</span>
                </div>
                <div class="step">
                    <span class="step-number">3</span>
                    <span class="step-text">登录成功后，返回此页面点击"获取Cookies"</span>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <a href="https://www.douyin.com/" target="_blank" class="btn btn-secondary">打开抖音</a>
                <button class="btn" onclick="extractCookies('douyin')">获取 Cookies</button>
            </div>
        </div>

        <!-- 小红书配置 -->
        <div class="platform-card xiaohongshu" id="xiaohongshu-card">
            <div class="platform-header">
                <div class="platform-icon">红</div>
                <span class="platform-name">小红书</span>
                <span class="status not-configured" id="xiaohongshu-status">未配置</span>
            </div>

            <div id="xiaohongshu-steps">
                <div class="step">
                    <span class="step-number">1</span>
                    <span class="step-text">点击下方按钮打开小红书网页版</span>
                </div>
                <div class="step">
                    <span class="step-number">2</span>
                    <span class="step-text">在小红书网页上登录你的账号</span>
                </div>
                <div class="step">
                    <span class="step-number">3</span>
                    <span class="step-text">登录成功后，返回此页面点击"获取Cookies"</span>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <a href="https://www.xiaohongshu.com/" target="_blank" class="btn btn-secondary">打开小红书</a>
                <button class="btn" onclick="extractCookies('xiaohongshu')">获取 Cookies</button>
            </div>
        </div>

        <div class="note">
            💡 <strong>提示：</strong>此工具仅在您的本地浏览器中运行，Cookies 不会发送到任何服务器。配置完成后，下载功能将可以正常使用。
        </div>

        <div class="code-block" id="cookie-display"></div>
    </div>

    <script>
        const API_BASE = window.location.port === '3000' || window.location.port === '3001'
            ? 'http://localhost:5000'
            : '';

        // 检查配置状态
        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/cookies/status`);
                const data = await response.json();

                if (data.douyin) {
                    document.getElementById('douyin-status').textContent = '已配置';
                    document.getElementById('douyin-status').className = 'status configured';
                    document.getElementById('douyin-card').classList.add('active');
                }

                if (data.xiaohongshu) {
                    document.getElementById('xiaohongshu-status').textContent = '已配置';
                    document.getElementById('xiaohongshu-status').className = 'status configured';
                    document.getElementById('xiaohongshu-card').classList.add('active');
                }
            } catch (e) {
                console.log('无法检查配置状态');
            }
        }

        // 提取 cookies
        async function extractCookies(platform) {
            const domains = {
                'douyin': '.douyin.com',
                'xiaohongshu': '.xiaohongshu.com'
            };

            const domain = domains[platform];
            const cookies = [];

            // 获取所有 cookies
            const allCookies = await navigator.cookies.getAll();

            // 过滤出对应域名的 cookies
            for (const cookie of allCookies) {
                if (cookie.domain.includes(domain.replace('.', '')) ||
                    cookie.domain === domain) {
                    cookies.push({
                        domain: cookie.domain,
                        path: cookie.path,
                        secure: cookie.secure || false,
                        expirationDate: cookie.expirationDate || Math.floor(Date.now() / 1000) + 86400,
                        name: cookie.name,
                        value: cookie.value
                    });
                }
            }

            if (cookies.length === 0) {
                showAlert('未找到 Cookies，请确保：\n1. 已在浏览器中登录对应平台\n2. 使用了 Chrome/Edge 浏览器\n3. 授予了扩展程序 Cookies 权限', 'error');
                return;
            }

            // 转换为 Netscape 格式
            let netscapeFormat = '# Netscape HTTP Cookie File\n';
            for (const cookie of cookies) {
                const flag = cookie.expirationDate ? 'FALSE' : 'TRUE';
                const expires = cookie.expirationDate || Math.floor(Date.now() / 1000) + 86400;
                netscapeFormat += `${cookie.domain}\t${flag}\t${cookie.path}\t${cookie.secure}\t${expires}\t${cookie.name}\t${cookie.value}\n`;
            }

            // 发送到后端
            try {
                const response = await fetch(`${API_BASE}/api/cookies/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ platform, cookies: netscapeFormat })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert(`✅ ${platform === 'douyin' ? '抖音' : '小红书'} Cookies 配置成功！`, 'success');

                    // 更新状态
                    const statusEl = document.getElementById(`${platform}-status`);
                    statusEl.textContent = '已配置';
                    statusEl.className = 'status configured';
                    document.getElementById(`${platform}-card`).classList.add('active');
                } else {
                    showAlert('配置失败：' + result.message, 'error');
                }
            } catch (e) {
                // 如果 API 不可用，显示 Netscape 格式让用户手动保存
                showAlert('API 不可用，请手动复制以下内容保存到对应的 cookies 文件：', 'info');
                document.getElementById('cookie-display').style.display = 'block';
                document.getElementById('cookie-display').textContent = netscapeFormat;
            }
        }

        function showAlert(message, type) {
            const alertEl = document.getElementById('alert');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type} show`;

            setTimeout(() => {
                alertEl.classList.remove('show');
            }, 5000);
        }

        // 页面加载时检查状态
        checkStatus();
    </script>
</body>
</html>
